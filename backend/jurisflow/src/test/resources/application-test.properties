spring.datasource.url=${JURISFLOW_TEST_DATABASE_URL}
spring.datasource.username=${JURISFLOW_TEST_DATABASE_USERNAME}
spring.datasource.password=${JURISFLOW_TEST_DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false
spring.flyway.clean-disabled=true

jurisflow.documentos.storage-path=${JURISFLOW_TEST_DOCUMENTOS_STORAGE_PATH}

server.port=0
