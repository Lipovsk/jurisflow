spring.application.name=jurisflow

spring.datasource.url=jdbc:postgresql://localhost:5432/jurisflow
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Baseline explicito da versao 1 concluido; Flyway habilitado por padrao, V1 congelada e futuras alteracoes de schema devem usar V2 ou superior; baseline-on-migrate permanece false.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false
spring.flyway.clean-disabled=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

jurisflow.documentos.storage-path=${JURISFLOW_DOCUMENTOS_STORAGE_PATH:${user.home}/.jurisflow/documentos}

server.port=8080
