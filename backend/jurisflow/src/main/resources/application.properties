spring.application.name=jurisflow

spring.datasource.url=jdbc:postgresql://localhost:5432/jurisflow
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# O banco principal ainda sera integrado por baseline controlado em fase posterior.
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=false
spring.flyway.clean-disabled=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

jurisflow.documentos.storage-path=${JURISFLOW_DOCUMENTOS_STORAGE_PATH:${user.home}/.jurisflow/documentos}

server.port=8080
