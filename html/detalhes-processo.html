<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalhes do Processo — JurisFlow</title>
  <link rel="stylesheet" href="../css/dashboard.css">
  <style>
    .breadcrumb { display:flex; align-items:center; gap:8px; font-size:.8rem; color:var(--gray-400); }
    .breadcrumb a { color:var(--gray-400); text-decoration:none; transition:color .15s; }
    .breadcrumb a:hover { color:var(--navy); }
    .breadcrumb .sep { color:var(--gray-300); }

    .proc-header {
      background:var(--white); border:1px solid var(--gray-100);
      border-radius:var(--radius-lg); box-shadow:var(--shadow-sm);
      padding:28px 32px; display:flex; align-items:flex-start; gap:20px;
      animation:fadeUp .3s ease both;
    }
    .proc-header-icon {
      width:56px; height:56px; background:var(--blue-soft); border-radius:var(--radius-md);
      display:flex; align-items:center; justify-content:center; font-size:1.5rem; flex-shrink:0;
    }
    .proc-header-info { flex:1; min-width:0; }
    .proc-numero { font-family:'DM Mono',monospace; font-size:.78rem; color:var(--gray-400); margin-bottom:4px; }
    .proc-titulo { font-family:'Playfair Display',serif; font-size:1.3rem; font-weight:700; color:var(--navy); }
    .proc-meta { display:flex; align-items:center; gap:10px; margin-top:8px; flex-wrap:wrap; }
    .proc-actions { display:flex; gap:10px; flex-shrink:0; }
    .btn-act {
      height:38px; padding:0 18px; border-radius:var(--radius-sm);
      font-family:'DM Sans',sans-serif; font-size:.83rem; font-weight:600;
      cursor:pointer; display:inline-flex; align-items:center; gap:6px; transition:all .2s;
    }
    .btn-outline-act { background:var(--white); border:1.5px solid var(--gray-200); color:var(--gray-700); }
    .btn-outline-act:hover { border-color:var(--navy); color:var(--navy); }
    .btn-navy-act { background:var(--navy); border:none; color:var(--white); }
    .btn-navy-act:hover { background:var(--navy-light); }

    .area-badge { display:inline-block; font-size:.67rem; font-weight:600; padding:3px 9px; border-radius:20px; text-transform:uppercase; letter-spacing:.04em; }
    .area-civel     { background:#EEF3FF; color:#2563EB; }
    .area-trabalhista{ background:#FFFBEB; color:#D97706; }
    .area-empresarial{ background:#ECFDF5; color:#059669; }
    .area-criminal  { background:#FEF2F2; color:#DC2626; }
    .area-familia   { background:#F5F3FF; color:#7C3AED; }

    .sp-andamento { background:#EEF3FF; color:#2563EB; }
    .sp-urgente   { background:#FEF2F2; color:#DC2626; }
    .sp-concluido { background:#ECFDF5; color:#059669; }
    .sp-suspenso  { background:#F1F5F9; color:#64748B; }
    .status-proc  { display:inline-flex; align-items:center; font-size:.72rem; font-weight:600; padding:4px 10px; border-radius:20px; }

    .prioridade-alta  { background:#FEF2F2; color:#DC2626; font-size:.67rem; font-weight:600; padding:3px 9px; border-radius:20px; display:inline-block; }
    .prioridade-media { background:#FFFBEB; color:#D97706; font-size:.67rem; font-weight:600; padding:3px 9px; border-radius:20px; display:inline-block; }
    .prioridade-baixa { background:#ECFDF5; color:#059669; font-size:.67rem; font-weight:600; padding:3px 9px; border-radius:20px; display:inline-block; }

    .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
    .detail-grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; }
    .info-card {
      background:var(--white); border:1px solid var(--gray-100);
      border-radius:var(--radius-lg); box-shadow:var(--shadow-sm); overflow:hidden;
      animation:fadeUp .35s ease both;
    }
    .ic-header { padding:15px 22px; border-bottom:1px solid var(--gray-100); font-family:'Playfair Display',serif; font-size:.92rem; font-weight:600; color:var(--navy); }
    .ic-body { padding:20px 22px; display:flex; flex-direction:column; gap:14px; }
    .ic-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .ic-field { display:flex; flex-direction:column; gap:3px; }
    .ic-label { font-size:.67rem; font-weight:600; color:var(--gray-400); text-transform:uppercase; letter-spacing:.05em; }
    .ic-value { font-size:.84rem; color:var(--gray-800); font-weight:500; }
    .ic-value.nd { color:var(--gray-300); font-style:italic; font-weight:400; }

    .progress-wrap { display:flex; align-items:center; gap:10px; }
    .progress-bar  { flex:1; height:7px; background:var(--gray-100); border-radius:4px; overflow:hidden; }
    .progress-fill { height:100%; border-radius:4px; background:linear-gradient(90deg,var(--navy-light),var(--navy)); }

    .client-link-card {
      background:var(--white); border:1px solid var(--gray-100);
      border-radius:var(--radius-lg); box-shadow:var(--shadow-sm);
      padding:18px 22px; display:flex; align-items:center; gap:16px;
      cursor:pointer; transition:background .15s; animation:fadeUp .4s ease both;
    }
    .client-link-card:hover { background:var(--gray-50); }
    .client-avatar { width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.85rem; font-weight:700; color:var(--white); flex-shrink:0; }
    .client-info { flex:1; min-width:0; }
    .client-name { font-weight:600; color:var(--navy); font-size:.9rem; }
    .client-sub  { font-size:.75rem; color:var(--gray-400); margin-top:2px; }

    .section-card {
      background:var(--white); border:1px solid var(--gray-100);
      border-radius:var(--radius-lg); box-shadow:var(--shadow-sm); overflow:hidden;
      animation:fadeUp .45s ease both;
    }
    .sc-head { padding:16px 22px; border-bottom:1px solid var(--gray-100); display:flex; align-items:center; justify-content:space-between; }
    .sc-title { font-family:'Playfair Display',serif; font-size:.92rem; font-weight:600; color:var(--navy); }
    .sc-count { font-size:.75rem; color:var(--gray-400); background:var(--gray-50); padding:3px 10px; border-radius:20px; font-weight:600; }

    .hon-row { display:flex; align-items:center; gap:14px; padding:13px 22px; border-bottom:1px solid var(--gray-100); transition:background .15s; }
    .hon-row:last-child { border-bottom:none; }
    .hon-row:hover { background:var(--gray-50); }
    .hon-info { flex:1; min-width:0; }
    .hon-tipo { font-size:.84rem; font-weight:600; color:var(--navy); }
    .hon-sub  { font-size:.72rem; color:var(--gray-400); margin-top:2px; }
    .hon-val  { font-size:.88rem; font-weight:700; margin-right:8px; }
    .hon-status { font-size:.68rem; font-weight:600; padding:3px 9px; border-radius:20px; }
    .hs-pago     { background:#ECFDF5; color:#059669; }
    .hs-pendente { background:#FFFBEB; color:#D97706; }
    .hs-inadimpl { background:#FEF2F2; color:#DC2626; }

    .andamento-obs { background:var(--gray-50); border-radius:var(--radius-sm); padding:14px 16px; font-size:.83rem; color:var(--gray-600); line-height:1.5; }

    .empty-state { padding:32px; text-align:center; color:var(--gray-400); font-size:.84rem; }
    .not-found { text-align:center; padding:60px 24px; }
    .not-found h2 { font-family:'Playfair Display',serif; color:var(--navy); margin-bottom:12px; }
    .not-found p  { color:var(--gray-400); margin-bottom:20px; }
    .not-found a  { color:var(--blue-accent); font-weight:600; text-decoration:none; }

    @media (max-width:1100px) {
      .detail-grid-3 { grid-template-columns:1fr 1fr; }
    }
    @media (max-width:900px) {
      .detail-grid, .detail-grid-3 { grid-template-columns:1fr; }
      .proc-header { flex-wrap:wrap; }
      .proc-actions { width:100%; }
    }
  </style>
</head>
<body>

<div id="sidebarOverlay" class="sidebar-overlay"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon">⚖</div>
    <div><div class="brand-name">JurisFlow</div><div class="brand-tagline">Sistema Jurídico</div></div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section-label">Principal</div>
    <a class="nav-item" data-page="dashboard" href="dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a>
    <a class="nav-item" data-page="clientes" href="clientes.html"><span class="nav-icon">👤</span> Clientes</a>
    <a class="nav-item active" data-page="processos" href="processos.html"><span class="nav-icon">📁</span> Processos<span class="nav-badge">5</span></a>
    <a class="nav-item" data-page="agenda" href="agenda.html"><span class="nav-icon">📅</span> Agenda</a>

    <a class="nav-item" data-page="financeiro" href="financeiro.html"><span class="nav-icon">💰</span> Financeiro</a>
    <a class="nav-item" data-page="documentos" href="documentos.html"><span class="nav-icon">📄</span> Documentos</a>

  </nav>
  <div class="sidebar-bottom">
    <div class="user-card" data-action="logout">
      <div class="user-avatar">CM</div>
      <div class="user-info"><div class="user-name">Dr. Carlos Mendes</div><div class="user-role">OAB 12.345/SP</div></div>
      <span style="font-size:.8rem;color:rgba(255,255,255,.3);">↩</span>

</aside>

<div class="main-wrapper">
  <header class="topbar">
    <button class="sidebar-toggle" id="sidebarToggle">☰</button>

      <div class="page-title" id="pageTitle">Detalhes do Processo</div>
      <div class="page-subtitle">Informações completas do processo</div>

<script src="../js/storage.js"></script>
<script src="../js/dashboard.js"></script>
<script>
(function(){
  'use strict';

  const CORES = [
    'linear-gradient(135deg,#2563EB,#1D4ED8)','linear-gradient(135deg,#10B981,#059669)',
    'linear-gradient(135deg,#F59E0B,#D97706)','linear-gradient(135deg,#8B5CF6,#7C3AED)',
    'linear-gradient(135deg,#F97316,#EA580C)','linear-gradient(135deg,#0D9488,#0F766E)',
    'linear-gradient(135deg,#6B7280,#4B5563)','linear-gradient(135deg,#EC4899,#DB2777)',
  ];
  function getCor(id) {
    const n = (id||'').split('').reduce((a,c)=>a+c.charCodeAt(0),0);
    return CORES[n % CORES.length];
  }
  function getIniciais(nome) {
    if (!nome) return '?';
    const p = nome.trim().split(/\s+/).filter(Boolean);
    if (p.length === 1) return p[0].slice(0,2).toUpperCase();
    return (p[0][0] + p[p.length-1][0]).toUpperCase();
  }
  function normArea(a) {
    if (!a) return '';
    const m = {'Cível':'civel','Trabalhista':'trabalhista','Empresarial':'empresarial','Criminal':'criminal','Família':'familia','Familia':'familia'};
    if (m[a]) return m[a];
    const s = a.toLowerCase();
    if (s.includes('civ'))    return 'civel';
    if (s.includes('trab'))   return 'trabalhista';
    if (s.includes('empres')) return 'empresarial';
    if (s.includes('crim'))   return 'criminal';
    if (s.includes('fam'))    return 'familia';
    return s;
  }
  function fmtData(iso) {
    if (!iso) return '—';
    try {
      const d = new Date(iso);
      return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear();
    } catch(e) { return '—'; }
  }
  function fmtMoeda(v) {
    if (!v && v !== 0) return '—';
    const n = parseFloat(String(v).replace(/\./g,'').replace(',','.')) || 0;
    return 'R$ ' + n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  }
  function fmtCompetencia(c) {
    if (!c) return '—';
    const parts = c.split('-');
    if (parts.length < 2) return c;
    const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    return (meses[parseInt(parts[1],10)-1] || parts[1]) + '/' + parts[0];
  }
  function prazoChip(iso) {
    if (!iso) return '<span style="color:var(--gray-400)">—</span>';
    const d = new Date(iso);
    const diff = Math.round((d - new Date()) / 86400000);
    const txt = String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear();
    const cls = diff < 0 ? 'prazo-red' : diff <= 7 ? 'prazo-red' : diff <= 30 ? 'prazo-amber' : 'prazo-green';
    const style = {
      'prazo-red'  :'background:#FEF2F2;color:#DC2626',
      'prazo-amber':'background:#FFFBEB;color:#D97706',
      'prazo-green':'background:#ECFDF5;color:#059669',
    }[cls];
    return `<span style="${style};font-size:.8rem;font-weight:600;padding:4px 10px;border-radius:20px;display:inline-block;">${txt}</span>`;
  }
  function v(val) { return val || '—'; }

  const areaMap   = {civel:'area-civel',trabalhista:'area-trabalhista',empresarial:'area-empresarial',criminal:'area-criminal',familia:'area-familia'};
  const areaLabel = {civel:'Cível',trabalhista:'Trabalhista',empresarial:'Empresarial',criminal:'Criminal',familia:'Família'};
  const statusMap = {
    andamento:{ cls:'sp-andamento', label:'Em andamento' },
    urgente:  { cls:'sp-urgente',   label:'⚠ Urgente' },
    concluido:{ cls:'sp-concluido', label:'Concluído' },
    suspenso: { cls:'sp-suspenso',  label:'Suspenso' },
  };
  const honStatusMap   = { pago:'hs-pago', pendente:'hs-pendente', inadimpl:'hs-inadimpl' };
  const honStatusLabel = { pago:'Pago', pendente:'Pendente', inadimpl:'Inadimplente' };
  const tipoHonLabel   = { fixo:'Honorário Fixo', retainer:'Retainer', exito:'Êxito', consulta:'Consulta', parcelado:'Parcelado' };
  const prioridadeMap  = { alta:'prioridade-alta', media:'prioridade-media', baixa:'prioridade-baixa' };
  const prioridadeLabel= { alta:'Alta', media:'Média', baixa:'Baixa' };

  const db = window.JurisFlow?.db;
  const main = document.getElementById('mainContent');

  if (!db) {
    main.innerHTML = '<div class="not-found"><h2>Erro</h2><p>Sistema de dados não carregado.</p><a href="processos.html">← Voltar</a></div>';
    return;
  }

  const id = new URLSearchParams(window.location.search).get('id');
  if (!id) {
    main.innerHTML = '<div class="not-found"><h2>Processo não encontrado</h2><p>Nenhum ID informado.</p><a href="processos.html">← Voltar para Processos</a></div>';
    return;
  }

  const processo = db.getProcesso(id);
  if (!processo) {
    main.innerHTML = '<div class="not-found"><h2>Processo não encontrado</h2><p>Este processo pode ter sido removido.</p><a href="processos.html">← Voltar para Processos</a></div>';
    return;
  }

  const honorarios = db.getHonorariosByProcesso(id);
  const cliente    = processo.clienteId ? db.getCliente(processo.clienteId) : null;

  document.getElementById('pageTitle').textContent = processo.numero || 'Processo';
  document.title = (processo.numero || 'Processo') + ' — JurisFlow';

  const area    = normArea(processo.areaJuridica);
  const aClasse = areaMap[area]   || 'area-civel';
  const aLabel  = areaLabel[area] || processo.areaJuridica || '—';
  const st      = statusMap[processo.status] || statusMap.andamento;
  const prio    = processo.prioridade;
  const andamento = processo.andamento || 0;

  function honRows() {
    if (!honorarios.length) return '<div class="empty-state">Nenhum honorário vinculado a este processo</div>';
    return honorarios.map(h => {
      const sCls   = honStatusMap[h.status]   || 'hs-pendente';
      const sLabel = honStatusLabel[h.status] || h.status;
      const tipo   = tipoHonLabel[h.tipoHonorario] || h.tipoHonorario || '—';
      const cor    = h.status === 'pago' ? 'var(--green)' : h.status === 'inadimpl' ? 'var(--red)' : 'var(--amber)';
      return `<div class="hon-row">
        <div class="hon-info">
          <div class="hon-tipo">${tipo}</div>
          <div class="hon-sub">${fmtCompetencia(h.competencia)} · ${h.clienteNome || '—'}</div>
        </div>
        <span class="hon-val" style="color:${cor};">${fmtMoeda(h.valorTotal)}</span>
        <span class="hon-status ${sCls}">${sLabel}</span>
      </div>`;
    }).join('');
  }

  main.innerHTML = `
    <div class="breadcrumb">
      <a href="processos.html">📁 Processos</a>
      <span class="sep">›</span>
      <span>${processo.numero || 'Processo'}</span>
    </div>

    <div class="proc-header">
      <div class="proc-header-icon">📁</div>
      <div class="proc-header-info">
        <div class="proc-numero">${v(processo.numero)}</div>
        <div class="proc-titulo">${v(processo.tipoAcao)}</div>
        <div class="proc-meta">
          <span class="area-badge ${aClasse}">${aLabel}</span>
          <span class="status-proc ${st.cls}">${st.label}</span>
          ${prio ? `<span class="${prioridadeMap[prio]||'prioridade-media'}">${prioridadeLabel[prio]||prio}</span>` : ''}
        </div>
      </div>
      <div class="proc-actions">
        <button class="btn-act btn-outline-act" onclick="window.location.href='processos.html'">← Voltar</button>
        <button class="btn-act btn-navy-act" onclick="window.JurisFlow?.showToast('Edição disponível em breve','info')">✏️ Editar</button>
      </div>
    </div>

    <div class="detail-grid">
      <div class="info-card">
        <div class="ic-header">🏛️ Dados Judiciais</div>
        <div class="ic-body">
          <div class="ic-row">
            <div class="ic-field">
              <div class="ic-label">Tribunal</div>
              <div class="ic-value ${!processo.tribunal?'nd':''}">${v(processo.tribunal)}</div>
            </div>
            <div class="ic-field">
              <div class="ic-label">Comarca</div>
              <div class="ic-value ${!processo.comarca?'nd':''}">${v(processo.comarca)}</div>
            </div>
          </div>
          <div class="ic-row">
            <div class="ic-field">
              <div class="ic-label">Vara</div>
              <div class="ic-value ${!processo.vara?'nd':''}">${v(processo.vara)}</div>
            </div>
            <div class="ic-field">
              <div class="ic-label">Juiz</div>
              <div class="ic-value ${!processo.juiz?'nd':''}">${v(processo.juiz)}</div>
            </div>
          </div>
        </div>
      </div>

      <div class="info-card">
        <div class="ic-header">📅 Datas e Prazos</div>
        <div class="ic-body">
          <div class="ic-row">
            <div class="ic-field">
              <div class="ic-label">Abertura</div>
              <div class="ic-value">${fmtData(processo.dataAbertura)}</div>
            </div>
            <div class="ic-field">
              <div class="ic-label">Prazo Final</div>
              <div class="ic-value">${prazoChip(processo.prazoFinal)}</div>
            </div>
          </div>
          <div class="ic-row">
            <div class="ic-field">
              <div class="ic-label">Audiência</div>
              <div class="ic-value ${!processo.dataAudiencia?'nd':''}">${fmtData(processo.dataAudiencia)}</div>
            </div>
            <div class="ic-field">
              <div class="ic-label">Prioridade</div>
              <div class="ic-value">${prio ? `<span class="${prioridadeMap[prio]||'prioridade-media'}">${prioridadeLabel[prio]||prio}</span>` : '—'}</div>
            </div>
          </div>
          <div class="ic-field">
            <div class="ic-label">Andamento</div>
            <div class="ic-value">
              <div class="progress-wrap">
                <div class="progress-bar"><div class="progress-fill" style="width:${andamento}%;"></div></div>
                <span style="font-size:.8rem;font-weight:700;color:var(--navy);min-width:36px;">${andamento}%</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    ${cliente ? `
    <div class="client-link-card" onclick="window.location.href='detalhes-cliente.html?id=${cliente.id}'">
      <div class="client-avatar" style="background:${getCor(cliente.id)};">${getIniciais(cliente.nome)}</div>
      <div class="client-info">
        <div class="client-name">${cliente.nome}</div>
        <div class="client-sub">${v(cliente.tipoCliente)} · ${v(cliente.areaJuridica)}</div>
      </div>
      <span style="color:var(--gray-400);font-size:.85rem;">Ver perfil →</span>
    </div>
    ` : ''}

    <div class="info-card">
      <div class="ic-header">💼 Financeiro</div>
      <div class="ic-body">
        <div class="ic-row">
          <div class="ic-field">
            <div class="ic-label">Valor da Causa</div>
            <div class="ic-value" style="font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--navy);">${fmtMoeda(processo.valorCausa)}</div>
          </div>
          <div class="ic-field">
            <div class="ic-label">Honorários Contratados</div>
            <div class="ic-value" style="font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--gold);">${fmtMoeda(processo.honorarios)}</div>
          </div>
        </div>
        <div class="ic-row">
          <div class="ic-field">
            <div class="ic-label">Status Financeiro</div>
            <div class="ic-value">${v(processo.statusFinanceiro)}</div>
          </div>
          <div class="ic-field">
            <div class="ic-label">Forma de Pagamento</div>
            <div class="ic-value ${!processo.formaPagamento?'nd':''}">${v(processo.formaPagamento)}</div>
          </div>
        </div>
        ${processo.observacoes ? `<div class="ic-field"><div class="ic-label">Observações</div><div class="andamento-obs">${processo.observacoes}</div></div>` : ''}
      </div>
    </div>

    <div class="section-card">
      <div class="sc-head">
        <span class="sc-title">💰 Honorários Lançados</span>
        <span class="sc-count">${honorarios.length}</span>
      </div>
      ${honRows()}
    </div>
  `;
})();
</script>
</body>
</html>
