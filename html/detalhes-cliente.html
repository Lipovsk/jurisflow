<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil do Cliente — JurisFlow</title>
  <link rel="stylesheet" href="../css/dashboard.css">
  <style>
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .8rem;
      color: var(--gray-400);
    }

    .breadcrumb a {
      color: var(--gray-400);
      text-decoration: none;
      transition: color .15s;
    }

    .breadcrumb a:hover {
      color: var(--navy);
    }

    .breadcrumb .sep {
      color: var(--gray-300);
    }

    .profile-header {
      background: var(--white);
      border: 1px solid var(--gray-100);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      padding: 28px 32px;
      display: flex;
      align-items: center;
      gap: 24px;
      animation: fadeUp .3s ease both;
    }

    .profile-avatar-big {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .profile-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--navy);
    }

    .profile-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .profile-cpf {
      font-size: .78rem;
      color: var(--gray-400);
      font-family: 'DM Mono', monospace;
    }

    .profile-since {
      font-size: .78rem;
      color: var(--gray-400);
    }

    .profile-actions {
      margin-left: auto;
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    .btn-act {
      height: 38px;
      padding: 0 18px;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: .83rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all .2s;
    }

    .btn-outline-act {
      background: var(--white);
      border: 1.5px solid var(--gray-200);
      color: var(--gray-700);
    }

    .btn-outline-act:hover {
      border-color: var(--navy);
      color: var(--navy);
    }

    .btn-navy-act {
      background: var(--navy);
      border: none;
      color: var(--white);
    }

    .btn-navy-act:hover {
      background: var(--navy-light);
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .info-card {
      background: var(--white);
      border: 1px solid var(--gray-100);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      animation: fadeUp .35s ease both;
    }

    .ic-header {
      padding: 15px 22px;
      border-bottom: 1px solid var(--gray-100);
      font-family: 'Playfair Display', serif;
      font-size: .92rem;
      font-weight: 600;
      color: var(--navy);
    }

    .ic-body {
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .ic-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .ic-field {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .ic-label {
      font-size: .67rem;
      font-weight: 600;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .ic-value {
      font-size: .84rem;
      color: var(--gray-800);
      font-weight: 500;
    }

    .ic-value.nd {
      color: var(--gray-300);
      font-style: italic;
      font-weight: 400;
    }

    .area-badge {
      display: inline-block;
      font-size: .67rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .area-civel {
      background: #EEF3FF;
      color: #2563EB;
    }

    .area-trabalhista {
      background: #FFFBEB;
      color: #D97706;
    }

    .area-empresarial {
      background: #ECFDF5;
      color: #059669;
    }

    .area-criminal {
      background: #FEF2F2;
      color: #DC2626;
    }

    .area-familia {
      background: #F5F3FF;
      color: #7C3AED;
    }

    .status-badge {
      display: inline-block;
      font-size: .67rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      text-transform: uppercase;
    }

    .sb-ativo {
      background: #ECFDF5;
      color: #059669;
    }

    .sb-inativo {
      background: #F1F5F9;
      color: #64748B;
    }

    .sb-pendente {
      background: #FFFBEB;
      color: #D97706;
    }

    .section-card {
      background: var(--white);
      border: 1px solid var(--gray-100);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      animation: fadeUp .4s ease both;
    }

    .sc-head {
      padding: 16px 22px;
      border-bottom: 1px solid var(--gray-100);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sc-title {
      font-family: 'Playfair Display', serif;
      font-size: .92rem;
      font-weight: 600;
      color: var(--navy);
    }

    .sc-count {
      font-size: .75rem;
      color: var(--gray-400);
      background: var(--gray-50);
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    .proc-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 22px;
      border-bottom: 1px solid var(--gray-100);
      transition: background .15s;
      cursor: pointer;
    }

    .proc-row:last-child {
      border-bottom: none;
    }

    .proc-row:hover {
      background: var(--gray-50);
    }

    .proc-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      background: var(--gray-50);
      flex-shrink: 0;
    }

    .proc-row-info {
      flex: 1;
      min-width: 0;
    }

    .proc-row-num {
      font-family: 'DM Mono', monospace;
      font-size: .72rem;
      color: var(--gray-400);
    }

    .proc-row-title {
      font-size: .84rem;
      font-weight: 600;
      color: var(--navy);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .proc-row-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .sp-andamento {
      background: #EEF3FF;
      color: #2563EB;
    }

    .sp-urgente {
      background: #FEF2F2;
      color: #DC2626;
    }

    .sp-concluido {
      background: #ECFDF5;
      color: #059669;
    }

    .sp-suspenso {
      background: #F1F5F9;
      color: #64748B;
    }

    .status-proc {
      display: inline-flex;
      align-items: center;
      font-size: .72rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
    }

    .hon-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 22px;
      border-bottom: 1px solid var(--gray-100);
      transition: background .15s;
    }

    .hon-row:last-child {
      border-bottom: none;
    }

    .hon-row:hover {
      background: var(--gray-50);
    }

    .hon-info {
      flex: 1;
      min-width: 0;
    }

    .hon-tipo {
      font-size: .84rem;
      font-weight: 600;
      color: var(--navy);
    }

    .hon-sub {
      font-size: .72rem;
      color: var(--gray-400);
      margin-top: 2px;
    }

    .hon-val {
      font-size: .88rem;
      font-weight: 700;
      margin-right: 8px;
    }

    .hon-status {
      font-size: .68rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
    }

    .hs-pago {
      background: #ECFDF5;
      color: #059669;
    }

    .hs-pendente {
      background: #FFFBEB;
      color: #D97706;
    }

    .hs-inadimpl {
      background: #FEF2F2;
      color: #DC2626;
    }

    .empty-state {
      padding: 32px;
      text-align: center;
      color: var(--gray-400);
      font-size: .84rem;
    }

    .not-found {
      text-align: center;
      padding: 60px 24px;
    }

    .not-found h2 {
      font-family: 'Playfair Display', serif;
      color: var(--navy);
      margin-bottom: 12px;
    }

    .not-found p {
      color: var(--gray-400);
      margin-bottom: 20px;
    }

    .not-found a {
      color: var(--blue-accent);
      font-weight: 600;
      text-decoration: none;
    }

    @media (max-width:900px) {
      .info-grid {
        grid-template-columns: 1fr;
      }

      .profile-header {
        flex-wrap: wrap;
      }

      .profile-actions {
        margin-left: 0;
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <div id="sidebarOverlay" class="sidebar-overlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">⚖</div>
      <div>
        <div class="brand-name">JurisFlow</div>
        <div class="brand-tagline">Sistema Jurídico</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Principal</div>
      <a class="nav-item" data-page="dashboard" href="dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a>
      <a class="nav-item active" data-page="clientes" href="clientes.html"><span class="nav-icon">👤</span> Clientes</a>
      <a class="nav-item" data-page="processos" href="processos.html"><span class="nav-icon">📁</span> Processos<span
          class="nav-badge">5</span></a>
      <a class="nav-item" data-page="agenda" href="agenda.html"><span class="nav-icon">📅</span> Agenda</a>
      <div class="nav-section-label">Financeiro</div>
      <a class="nav-item" data-page="financeiro" href="financeiro.html"><span class="nav-icon">💰</span> Financeiro</a>
      <a class="nav-item" data-page="documentos" href="documentos.html"><span class="nav-icon">📄</span> Documentos</a>
      <div class="nav-section-label">Sistema</div>
      <a class="nav-item" data-page="configuracoes" href="configuracoes.html"><span class="nav-icon">⚙️</span>
        Configurações</a>
    </nav>
    <div class="sidebar-bottom">
      <div class="user-card" data-action="logout">
        <div class="user-avatar">CM</div>
        <div class="user-info">
          <div class="user-name">Dr. Carlos Mendes</div>
          <div class="user-role">OAB 12.345/SP</div>
        </div>
        <span style="font-size:.8rem;color:rgba(255,255,255,.3);">↩</span>
      </div>
    </div>
  </aside>

  <div class="main-wrapper">
    <header class="topbar">
      <button class="sidebar-toggle" id="sidebarToggle">☰</button>
      <div class="topbar-left">
        <div class="page-title" id="pageTitle">Perfil do Cliente</div>
        <div class="page-subtitle">Informações completas e histórico</div>
      </div>
      <div class="topbar-right">
        <span id="topbarClock" style="font-size:.82rem;color:var(--gray-400);font-weight:500;margin-right:4px;"></span>
        <button class="topbar-btn" id="notifBtn">🔔<span class="notif-dot"></span></button>
        <div class="topbar-divider"></div>
        <div class="topbar-user">
          <div class="topbar-avatar">CM</div>
          <div class="topbar-user-name">Dr. Mendes</div>
        </div>
      </div>
    </header>

    <main class="page-content" id="mainContent">
      <div class="empty-state">Carregando...</div>
    </main>
  </div>

  <script src="../js/storage.js"></script>
  <script src="../js/dashboard.js"></script>
  <script>
    (function () {
      'use strict';

      const CORES = [
        'linear-gradient(135deg,#2563EB,#1D4ED8)',
        'linear-gradient(135deg,#10B981,#059669)',
        'linear-gradient(135deg,#F59E0B,#D97706)',
        'linear-gradient(135deg,#8B5CF6,#7C3AED)',
        'linear-gradient(135deg,#F97316,#EA580C)',
        'linear-gradient(135deg,#0D9488,#0F766E)',
        'linear-gradient(135deg,#6B7280,#4B5563)',
        'linear-gradient(135deg,#EC4899,#DB2777)'
      ];

      function getCor(id) {
        const n = String(id || '')
          .split('')
          .reduce((a, c) => a + c.charCodeAt(0), 0);

        return CORES[n % CORES.length];
      }

      function getIniciais(nome) {
        if (!nome) return '?';
        const p = nome.trim().split(/\s+/).filter(Boolean);
        if (p.length === 1) return p[0].slice(0, 2).toUpperCase();
        return (p[0][0] + p[p.length - 1][0]).toUpperCase();
      }

      function normArea(a) {
        if (!a) return '';
        const m = {
          'Cível': 'civel',
          'Trabalhista': 'trabalhista',
          'Empresarial': 'empresarial',
          'Criminal': 'criminal',
          'Família': 'familia',
          'Familia': 'familia'
        };

        if (m[a]) return m[a];

        const s = a.toLowerCase();

        if (s.includes('civ')) return 'civel';
        if (s.includes('trab')) return 'trabalhista';
        if (s.includes('empres')) return 'empresarial';
        if (s.includes('crim')) return 'criminal';
        if (s.includes('fam')) return 'familia';

        return s;
      }

      function fmtData(iso) {
        if (!iso) return '—';

        try {
          const d = new Date(iso);

          if (isNaN(d.getTime())) return '—';

          return String(d.getDate()).padStart(2, '0') + '/' +
            String(d.getMonth() + 1).padStart(2, '0') + '/' +
            d.getFullYear();

        } catch (e) {
          return '—';
        }
      }

      function v(val) {
        return val || '—';
      }

      const areaMap = {
        civel: 'area-civel',
        trabalhista: 'area-trabalhista',
        empresarial: 'area-empresarial',
        criminal: 'area-criminal',
        familia: 'area-familia'
      };

      const areaLabel = {
        civel: 'Cível',
        trabalhista: 'Trabalhista',
        empresarial: 'Empresarial',
        criminal: 'Criminal',
        familia: 'Família'
      };

      const id = new URLSearchParams(window.location.search).get('id');
      const main = document.getElementById('mainContent');

      if (!id) {
        main.innerHTML = `
      <div class="not-found">
        <h2>Cliente não encontrado</h2>
        <p>Nenhum ID foi informado.</p>
        <a href="clientes.html">← Voltar para Clientes</a>
      </div>
    `;
        return;
      }

      async function carregarCliente() {
        try {
          const resposta = await fetch(`http://localhost:8080/clientes/${id}`);

          if (!resposta.ok) {
            throw new Error('Cliente não encontrado');
          }

          const cliente = await resposta.json();

          const processos = [];
          const honorarios = [];

          document.getElementById('pageTitle').textContent = cliente.nome;
          document.title = cliente.nome + ' — JurisFlow';

          const area = normArea(cliente.areaJuridica);
          const aClasse = areaMap[area] || 'area-civel';
          const aLabel = areaLabel[area] || cliente.areaJuridica || '—';

          const stCls = {
            ativo: 'sb-ativo',
            inativo: 'sb-inativo',
            pendente: 'sb-pendente'
          }[cliente.status] || 'sb-ativo';

          const stLabel = {
            ativo: 'Ativo',
            inativo: 'Inativo',
            pendente: 'Pendente'
          }[cliente.status] || cliente.status || 'Ativo';

          function procRows() {
            return '<div class="empty-state">Nenhum processo vinculado</div>';
          }

          function honRows() {
            return '<div class="empty-state">Nenhum honorário registrado</div>';
          }

          main.innerHTML = `
        <div class="breadcrumb">
          <a href="clientes.html">👤 Clientes</a>
          <span class="sep">›</span>
          <span>${cliente.nome}</span>
        </div>

        <div class="profile-header">
          <div class="profile-avatar-big" style="background:${getCor(cliente.id)};">
            ${getIniciais(cliente.nome)}
          </div>

          <div style="flex:1;min-width:0;">
            <div class="profile-name">${cliente.nome}</div>

            <div class="profile-meta">
              ${cliente.cpfCnpj ? `<span class="profile-cpf">${cliente.cpfCnpj}</span>` : ''}
              <span class="area-badge ${aClasse}">${aLabel}</span>
              <span class="status-badge ${stCls}">${stLabel}</span>
              <span class="profile-since">Cliente desde ${fmtData(cliente.dataCadastro)}</span>
            </div>
          </div>
      <div class="profile-actions">
          <button class="btn-act btn-outline-act" onclick="window.location.href='clientes.html'">
  ← Voltar
</button>

<button class="btn-act btn-navy-act" id="btnEditarCliente">
  ✏️ Editar
</button>

<button class="btn-act btn-outline-act" id="btnExcluirCliente" style="border-color:#DC2626;color:#DC2626;">
  🗑️ Excluir
</button>
          </div>
        </div>

        <div class="info-grid">
          <div class="info-card">
            <div class="ic-header">📞 Contato</div>

            <div class="ic-body">
              <div class="ic-row">
                <div class="ic-field">
                  <div class="ic-label">Telefone</div>
                  <div class="ic-value ${!cliente.telefone ? 'nd' : ''}">
                    ${v(cliente.telefone)}
                  </div>
                </div>

                <div class="ic-field">
                  <div class="ic-label">E-mail</div>
                  <div class="ic-value ${!cliente.email ? 'nd' : ''}">
                    ${v(cliente.email)}
                  </div>
                </div>
              </div>

              <div class="ic-field">
                <div class="ic-label">Endereço</div>
                <div class="ic-value ${!cliente.endereco ? 'nd' : ''}">
                  ${v(cliente.endereco)}
                </div>
              </div>
            </div>
          </div>

          <div class="info-card">
            <div class="ic-header">⚖️ Dados Jurídicos</div>

            <div class="ic-body">
              <div class="ic-row">
                <div class="ic-field">
                  <div class="ic-label">CPF / CNPJ</div>
                  <div class="ic-value" style="font-family:'DM Mono',monospace;font-size:.8rem;">
                    ${v(cliente.cpfCnpj)}
                  </div>
                </div>

                <div class="ic-field">
                  <div class="ic-label">Status</div>
                  <div class="ic-value">${v(cliente.status)}</div>
                </div>
              </div>

              <div class="ic-row">
                <div class="ic-field">
                  <div class="ic-label">Área Jurídica</div>
                  <div class="ic-value">${v(cliente.areaJuridica)}</div>
                </div>

                <div class="ic-field">
                  <div class="ic-label">Tipo</div>
                  <div class="ic-value">${v(cliente.tipoCliente)}</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="section-card">
          <div class="sc-head">
            <span class="sc-title">📁 Processos</span>
            <span class="sc-count">${processos.length}</span>
          </div>
          ${procRows()}
        </div>

        <div class="section-card">
          <div class="sc-head">
            <span class="sc-title">💰 Honorários</span>
            <span class="sc-count">${honorarios.length}</span>
          </div>
          ${honRows()}
        </div>
      `;

          document.getElementById("btnEditarCliente").addEventListener("click", () => {
            abrirModalEdicao(cliente);
          });

          document.getElementById("btnExcluirCliente").addEventListener("click", async () => {

            const confirmar = confirm("Tem certeza que deseja excluir este cliente?");

            if (!confirmar) return;

            try {

              const resposta = await fetch(`http://localhost:8080/clientes/${cliente.id}`, {
                method: "DELETE"
              });

              if (!resposta.ok) {
                throw new Error("Erro ao excluir");
              }

              alert("Cliente excluído com sucesso!");

              window.location.href = "clientes.html";

            } catch (erro) {

              console.error(erro);

              alert("Erro ao excluir cliente.");

            }

          });

        } catch (erro) {

          console.error(erro);

          main.innerHTML = `
        <div class="not-found">
          <h2>Erro ao carregar cliente</h2>
          <p>Verifique se o backend está ligado.</p>
          <a href="clientes.html">← Voltar para Clientes</a>
        </div>
      `;
        }
      }

      function abrirModalEdicao(cliente) {
        const modal = document.createElement("div");

        modal.style.position = "fixed";
        modal.style.inset = "0";
        modal.style.background = "rgba(13,27,42,.45)";
        modal.style.backdropFilter = "blur(4px)";
        modal.style.zIndex = "9999";
        modal.style.display = "flex";
        modal.style.alignItems = "center";
        modal.style.justifyContent = "center";
        modal.style.padding = "20px";

        modal.innerHTML = `
    <div style="
      background:white;
      width:100%;
      max-width:520px;
      border-radius:18px;
      box-shadow:0 20px 50px rgba(0,0,0,.18);
      overflow:hidden;
    ">
      <div style="
        padding:22px 26px;
        border-bottom:1px solid #eee;
        display:flex;
        justify-content:space-between;
        align-items:center;
      ">
        <h3 style="margin:0;color:#0D1B2A;">Editar Cliente</h3>

        <button id="fecharModalEdicao" style="
          border:none;
          background:#f1f5f9;
          width:32px;
          height:32px;
          border-radius:8px;
          cursor:pointer;
        ">✕</button>
      </div>

      <div style="padding:24px 26px;display:flex;flex-direction:column;gap:14px;">
        <input id="editNome" value="${cliente.nome || ''}" placeholder="Nome" style="height:42px;padding:0 14px;border:1px solid #ddd;border-radius:10px;">
        <input id="editCpfCnpj" value="${cliente.cpfCnpj || ''}" placeholder="CPF/CNPJ" style="height:42px;padding:0 14px;border:1px solid #ddd;border-radius:10px;">
        <input id="editTelefone" value="${cliente.telefone || ''}" placeholder="Telefone" style="height:42px;padding:0 14px;border:1px solid #ddd;border-radius:10px;">
        <input id="editEmail" value="${cliente.email || ''}" placeholder="Email" style="height:42px;padding:0 14px;border:1px solid #ddd;border-radius:10px;">
        <input id="editEndereco" value="${cliente.endereco || ''}" placeholder="Endereço" style="height:42px;padding:0 14px;border:1px solid #ddd;border-radius:10px;">

        <select id="editStatus" style="height:42px;padding:0 14px;border:1px solid #ddd;border-radius:10px;">
          <option value="ativo" ${cliente.status === 'ativo' ? 'selected' : ''}>Ativo</option>
          <option value="pendente" ${cliente.status === 'pendente' ? 'selected' : ''}>Pendente</option>
          <option value="inativo" ${cliente.status === 'inativo' ? 'selected' : ''}>Inativo</option>
        </select>
      </div>

      <div style="
        padding:16px 26px;
        border-top:1px solid #eee;
        display:flex;
        justify-content:flex-end;
        gap:10px;
      ">
        <button id="cancelarEdicao" style="
          height:38px;
          padding:0 16px;
          border:1px solid #ddd;
          background:white;
          border-radius:10px;
          cursor:pointer;
        ">Cancelar</button>

        <button id="salvarEdicao" style="
          height:38px;
          padding:0 18px;
          border:none;
          background:#0D1B2A;
          color:white;
          border-radius:10px;
          cursor:pointer;
          font-weight:600;
        ">Salvar Alterações</button>
      </div>
    </div>
  `;

        document.body.appendChild(modal);

        document.getElementById("fecharModalEdicao").addEventListener("click", () => modal.remove());
        document.getElementById("cancelarEdicao").addEventListener("click", () => modal.remove());

        document.getElementById("salvarEdicao").addEventListener("click", async () => {
          const clienteAtualizado = {
            nome: document.getElementById("editNome").value,
            cpfCnpj: document.getElementById("editCpfCnpj").value,
            telefone: document.getElementById("editTelefone").value,
            email: document.getElementById("editEmail").value,
            endereco: document.getElementById("editEndereco").value,
            status: document.getElementById("editStatus").value
          };

          const resposta = await fetch(`http://localhost:8080/clientes/${cliente.id}`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(clienteAtualizado)
          });

          if (!resposta.ok) {
            alert("Erro ao editar cliente.");
            return;
          }

          alert("Cliente atualizado com sucesso!");
          modal.remove();
          carregarCliente();
        });
      }

      carregarCliente();
    })();
  </script>
</body>

</html>
