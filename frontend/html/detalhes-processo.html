<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="../css/preferencias-aparencia.css">
  <style>
    .breadcrumb { display:flex; align-items:center; gap:8px; font-size:.8rem; color:var(--gray-400); }
    .breadcrumb a { color:var(--gray-400); text-decoration:none; transition:color .15s; }
    .breadcrumb a:hover { color:var(--navy); }
    .breadcrumb .sep { color:var(--gray-300); }

    .proc-header {
      background:var(--white); border:1px solid var(--gray-100);
      border-radius:var(--radius-lg); box-shadow:var(--shadow-sm);
      padding:28px 32px; display:flex; align-items:flex-start; gap:20px;
      animation:fadeUp .3s ease both;
    }
    .proc-header-icon {
      width:56px; height:56px; background:var(--blue-soft); border-radius:var(--radius-md);
      display:flex; align-items:center; justify-content:center; font-size:1.5rem; flex-shrink:0;
    }
    .proc-header-info { flex:1; min-width:0; }
    .proc-numero { font-family:'DM Mono',monospace; font-size:.78rem; color:var(--gray-400); margin-bottom:4px; }
    .proc-titulo { font-family:'Playfair Display',serif; font-size:1.3rem; font-weight:700; color:var(--navy); }
    .proc-meta { display:flex; align-items:center; gap:10px; margin-top:8px; flex-wrap:wrap; }
    .proc-actions { display:flex; gap:10px; flex-shrink:0; }
    .btn-act {
      height:38px; padding:0 18px; border-radius:var(--radius-sm);
      font-family:'DM Sans',sans-serif; font-size:.83rem; font-weight:600;
      cursor:pointer; display:inline-flex; align-items:center; gap:6px; transition:all .2s;
    }
    .btn-outline-act { background:var(--white); border:1.5px solid var(--gray-200); color:var(--gray-700); }
    .btn-outline-act:hover { border-color:var(--navy); color:var(--navy); }
    .btn-navy-act { background:var(--navy); border:none; color:var(--white); }
    .btn-navy-act:hover { background:var(--navy-light); }

    .area-badge { display:inline-block; font-size:.67rem; font-weight:600; padding:3px 9px; border-radius:20px; text-transform:uppercase; letter-spacing:.04em; }
    .area-civel     { background:#EEF3FF; color:#2563EB; }
    .area-trabalhista{ background:#FFFBEB; color:#D97706; }
    .area-empresarial{ background:#ECFDF5; color:#059669; }
    .area-criminal  { background:#FEF2F2; color:#DC2626; }
    .area-familia   { background:#F5F3FF; color:#7C3AED; }

    .sp-em-andamento { background:#EEF3FF; color:#2563EB; }
    .sp-audiencia-designada { background:#FFFBEB; color:#D97706; }
    .sp-suspenso  { background:#F1F5F9; color:#64748B; }
    .sp-encerrado { background:#ECFDF5; color:#059669; }
    .sp-arquivado { background:#F1F5F9; color:#475569; }
    .sp-nao-padronizado { background:#FEF2F2; color:#DC2626; }
    .status-proc  { display:inline-flex; align-items:center; font-size:.72rem; font-weight:600; padding:4px 10px; border-radius:20px; }

    .prioridade-urgente { background:#FEF2F2; color:#DC2626; font-size:.67rem; font-weight:600; padding:3px 9px; border-radius:20px; display:inline-block; }
    .prioridade-alta  { background:#FEF2F2; color:#DC2626; font-size:.67rem; font-weight:600; padding:3px 9px; border-radius:20px; display:inline-block; }
    .prioridade-media { background:#FFFBEB; color:#D97706; font-size:.67rem; font-weight:600; padding:3px 9px; border-radius:20px; display:inline-block; }
    .prioridade-baixa { background:#ECFDF5; color:#059669; font-size:.67rem; font-weight:600; padding:3px 9px; border-radius:20px; display:inline-block; }

    .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
    .detail-grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; }
    .info-card {
      background:var(--white); border:1px solid var(--gray-100);
      border-radius:var(--radius-lg); box-shadow:var(--shadow-sm); overflow:hidden;
      animation:fadeUp .35s ease both;
    }
    .ic-header { padding:15px 22px; border-bottom:1px solid var(--gray-100); font-family:'Playfair Display',serif; font-size:.92rem; font-weight:600; color:var(--navy); }
    .ic-body { padding:20px 22px; display:flex; flex-direction:column; gap:14px; }
    .ic-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .ic-field { display:flex; flex-direction:column; gap:3px; }
    .ic-label { font-size:.67rem; font-weight:600; color:var(--gray-400); text-transform:uppercase; letter-spacing:.05em; }
    .ic-value { font-size:.84rem; color:var(--gray-800); font-weight:500; }
    .ic-value.nd { color:var(--gray-300); font-style:italic; font-weight:400; }

    .client-link-card {
      background:var(--white); border:1px solid var(--gray-100);

      padding:18px 22px; display:flex; align-items:center; gap:16px;
      cursor:pointer; transition:background .15s; animation:fadeUp .4s ease both;

    .client-link-card:hover { background:var(--gray-50); }
    .client-avatar { width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.85rem; font-weight:700; color:var(--white); flex-shrink:0; }
    .client-info { flex:1; min-width:0; }
    .client-name { font-weight:600; color:var(--navy); font-size:.9rem; }
    .client-sub  { font-size:.75rem; color:var(--gray-400); margin-top:2px; }

    .section-card {
      background:var(--white); border:1px solid var(--gray-100);
      border-radius:var(--radius-lg); box-shadow:var(--shadow-sm); overflow:hidden;
      animation:fadeUp .45s ease both;

    .sc-title { font-family:'Playfair Display',serif; font-size:.92rem; font-weight:600; color:var(--navy); }
    .sc-count { font-size:.75rem; color:var(--gray-400); background:var(--gray-50); padding:3px 10px; border-radius:20px; font-weight:600; }

    .linked-list { display:flex; flex-direction:column; }
    .linked-item { padding:18px 22px; border-bottom:1px solid var(--gray-100); }
    .linked-item:last-child { border-bottom:none; }
    .linked-top { display:flex; align-items:flex-start; justify-content:space-between; gap:14px; margin-bottom:12px; }

    .linked-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; }
    .linked-field { min-width:0; }

    .linked-value { margin-top:3px; color:var(--gray-700); font-size:.8rem; line-height:1.4; overflow-wrap:anywhere; }

    .linked-desc { margin-top:12px; background:var(--gray-50); border-radius:var(--radius-sm); padding:11px 12px; color:var(--gray-600); font-size:.8rem; line-height:1.5; white-space:pre-wrap; }

    .origin-legacy { background:#F1F5F9; color:#64748B; }
    .tech-ref { margin-top:10px; color:var(--gray-300); font-family:'DM Mono',monospace; font-size:.67rem; overflow-wrap:anywhere; }

    .edit-modal form {
      display:flex; flex:1; flex-direction:column; min-height:0;

    .edit-head {

    .edit-title { font-family:'Playfair Display',serif; font-size:1.08rem; font-weight:700; color:var(--navy); }
    .edit-sub { font-size:.75rem; color:var(--gray-400); margin-top:2px; }
    .edit-close {
      width:34px; height:34px; border:none; background:var(--gray-100);

    }
    .edit-body { flex:1; min-height:0; padding:20px 22px; overflow:auto; }
    .edit-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:14px; }
    .edit-field { display:flex; flex-direction:column; gap:6px; min-width:0; }
    .edit-field.full { grid-column:1 / -1; }
    .edit-field label {
      font-size:.68rem; font-weight:700; color:var(--gray-500);
      text-transform:uppercase; letter-spacing:.05em;
    }
    .edit-field input,
    .edit-field select,
    .edit-field textarea {
      width:100%; min-height:40px; border:1px solid var(--gray-200);
      border-radius:var(--radius-sm); padding:0 11px; background:var(--white);
      color:var(--gray-800); font-family:'DM Sans',sans-serif; font-size:.84rem; outline:none;
    }
    .edit-field textarea { min-height:90px; padding-top:10px; resize:vertical; line-height:1.5; }
    .edit-field input:focus,
    .edit-field select:focus,
    .edit-field textarea:focus { border-color:var(--navy-light); }
    .edit-field.has-error input { border-color:var(--red); }
    .edit-error { display:none; font-size:.72rem; color:var(--red); }
    .edit-field.has-error .edit-error { display:block; }
    .edit-actions {
      padding:14px 22px; border-top:1px solid var(--gray-100);
      display:flex; justify-content:flex-end; gap:10px;
      flex-shrink:0; background:var(--white);
    }
    .cliente-edit-wrap { position:relative; }
    .cliente-dropdown {
      display:none; position:absolute; top:calc(100% + 4px); left:0; right:0;
      max-height:220px; overflow:auto; z-index:410; background:var(--white);
      border:1px solid var(--gray-200); border-radius:var(--radius-md); box-shadow:var(--shadow-lg);
    }
    .cliente-dropdown.open { display:block; }
    .cliente-option { padding:10px 12px; cursor:pointer; border-bottom:1px solid var(--gray-100); }
    .cliente-option:last-child { border-bottom:none; }
    .cliente-option:hover { background:var(--gray-50); }
    .cliente-option strong { display:block; color:var(--navy); font-size:.84rem; }
    .cliente-option span { display:block; color:var(--gray-400); font-size:.72rem; margin-top:2px; }

    @media (max-width:1100px) {
      .detail-grid-3 { grid-template-columns:1fr 1fr; }
      .edit-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
    }
    @media (max-width:900px) {
      .detail-grid, .detail-grid-3 { grid-template-columns:1fr; }
      .linked-grid { grid-template-columns:1fr 1fr; }
      .proc-header { flex-wrap:wrap; }
      .proc-actions { width:100%; }
      .edit-grid { grid-template-columns:1fr; }
    }
    @media (max-width:640px) {
      .linked-top { flex-direction:column; align-items:flex-start; }
      .linked-grid { grid-template-columns:1fr; }
    }
  </style>

<script>
(function(){
  'use strict';

  const API_BASE = 'http://localhost:8080';
  const NAO_INFORMADO = 'Não informado';
  const main = document.getElementById('mainContent');
  const idParam = new URLSearchParams(window.location.search).get('id');
  const processoId = Number(idParam);
  let processoAtual = null;
  let clientes = [];

  function getCor(id) {
    const CORES = [
      'linear-gradient(135deg,#2563EB,#1D4ED8)','linear-gradient(135deg,#10B981,#059669)',
      'linear-gradient(135deg,#F59E0B,#D97706)','linear-gradient(135deg,#8B5CF6,#7C3AED)',
      'linear-gradient(135deg,#F97316,#EA580C)','linear-gradient(135deg,#0D9488,#0F766E)',
      'linear-gradient(135deg,#6B7280,#4B5563)','linear-gradient(135deg,#EC4899,#DB2777)',
    ];
    const n = String(id || '').split('').reduce((a,c)=>a+c.charCodeAt(0),0);
    return CORES[n % CORES.length];
  }

  function getIniciais(nome) {
    if (!nome) return '?';
    const p = nome.trim().split(/\s+/).filter(Boolean);
    if (p.length === 1) return p[0].slice(0,2).toUpperCase();
    return (p[0][0] + p[p.length-1][0]).toUpperCase();
  }

  function escapeHtml(value) {
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  async function lerMensagemErroApi(resposta, fallback) {
    try {
      const dados = await resposta.json();
      return dados?.message || dados?.erro || dados?.error || fallback;
    } catch {
      return fallback;
    }
  }

  function normalizarTexto(value) {
    return String(value ?? '')
      .trim()
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/[_-]+/g, ' ')
      .replace(/\s+/g, ' ');
  }

  function texto(value, fallback = NAO_INFORMADO) {
    const val = String(value ?? '').trim();
    return val || fallback;
  }

  function normArea(a) {
    const s = normalizarTexto(a);
    if (!s) return '';
    if (s.includes('civ')) return 'civel';
    if (s.includes('trab')) return 'trabalhista';
    if (s.includes('empres')) return 'empresarial';
    if (s.includes('crim')) return 'criminal';
    if (s.includes('fam')) return 'familia';
    return s;
  }

  function datePart(value) {
    const match = String(value ?? '').trim().match(/^(\d{4})-(\d{2})-(\d{2})/);
    return match ? match[0] : '';
  }

  function dateFromPart(part) {
    if (!part) return null;
    const [ano, mes, dia] = part.split('-').map(Number);
    const data = new Date(ano, mes - 1, dia);
    if (data.getFullYear() !== ano || data.getMonth() !== mes - 1 || data.getDate() !== dia) return null;
    return data;
  }

  function fmtData(value, fallback = NAO_INFORMADO) {
    const data = dateFromPart(datePart(value));
    if (!data) return fallback;
    if (typeof window.JurisFlowFormatarData === 'function') {
      return window.JurisFlowFormatarData(value);
    }
    return `${String(data.getDate()).padStart(2,'0')}/${String(data.getMonth()+1).padStart(2,'0')}/${data.getFullYear()}`;
  }

  function prazoChip(value) {
    const data = dateFromPart(datePart(value));
    if (!data) return `<span style="color:var(--gray-400)">${NAO_INFORMADO}</span>`;
    const hoje = new Date();
    hoje.setHours(0,0,0,0);
    const diff = Math.round((data - hoje) / 86400000);
    const txt = fmtData(value);
    const cls = diff < 0 ? 'prazo-red' : diff <= 7 ? 'prazo-red' : diff <= 30 ? 'prazo-amber' : 'prazo-green';
    const style = {
      'prazo-red'  :'background:#FEF2F2;color:#DC2626',
      'prazo-amber':'background:#FFFBEB;color:#D97706',
      'prazo-green':'background:#ECFDF5;color:#059669',
    }[cls];
    return `<span style="${style};font-size:.8rem;font-weight:600;padding:4px 10px;border-radius:20px;display:inline-block;">${txt}</span>`;
  }

  function fmtMoeda(value) {
    if (value === null || value === undefined || value === '') return NAO_INFORMADO;
    const numero = Number(value);
    if (!Number.isFinite(numero)) return NAO_INFORMADO;
    return numero.toLocaleString('pt-BR', { style:'currency', currency:'BRL' });
  }

  function moedaInput(value) {
    if (value === null || value === undefined || value === '') return '';
    const numero = Number(value);
    return Number.isFinite(numero) ? numero.toLocaleString('pt-BR', { minimumFractionDigits:2, maximumFractionDigits:2 }) : '';
  }

  function parseMoeda(value) {
    const textoValor = String(value ?? '').trim();
    if (!textoValor) return null;
    const numero = Number(textoValor.replace(/\./g, '').replace(',', '.'));
    return Number.isFinite(numero) ? numero : null;
  }

  function parseInteiro(value) {
    const textoValor = String(value ?? '').trim();
    if (!textoValor) return null;
    const numero = Number(textoValor);
    return Number.isInteger(numero) ? numero : null;
  }

  function textoOuNull(value) {
    const textoValor = String(value ?? '').trim();
    return textoValor || null;
  }

  const areaMap = { civel:'area-civel', trabalhista:'area-trabalhista', empresarial:'area-empresarial', criminal:'area-criminal', familia:'area-familia' };
  const areaLabel = { civel:'Cível', trabalhista:'Trabalhista', empresarial:'Empresarial', criminal:'Criminal', familia:'Família' };
  const statusMap = {
    em_andamento: { cls:'sp-em-andamento', label:'Em andamento' },
    audiencia_designada: { cls:'sp-audiencia-designada', label:'Audiência designada' },
    suspenso: { cls:'sp-suspenso', label:'Suspenso' },
    encerrado: { cls:'sp-encerrado', label:'Encerrado' },
    arquivado: { cls:'sp-arquivado', label:'Arquivado' }
  };
  const prioridadeMap = { urgente:'prioridade-urgente', alta:'prioridade-alta', media:'prioridade-media', baixa:'prioridade-baixa' };
  const prioridadeLabel = { urgente:'Urgente', alta:'Alta', media:'Média', baixa:'Baixa' };

  function normalizarStatus(status) {
    const valor = normalizarTexto(status);
    if (valor === 'andamento' || valor === 'em andamento') return { value:'em_andamento', ...statusMap.em_andamento, padronizado:true };
    if (valor === 'audiencia' || valor === 'audiencia designada') return { value:'audiencia_designada', ...statusMap.audiencia_designada, padronizado:true };
    if (valor === 'concluido' || valor === 'encerrado') return { value:'encerrado', ...statusMap.encerrado, padronizado:true };
    if (valor === 'suspenso') return { value:'suspenso', ...statusMap.suspenso, padronizado:true };
    if (valor === 'arquivado') return { value:'arquivado', ...statusMap.arquivado, padronizado:true };
    if (!valor) return { value:'', label:NAO_INFORMADO, cls:'sp-nao-padronizado', padronizado:true };
    return { value:valor, label:'Status não padronizado', cls:'sp-nao-padronizado', padronizado:false };
  }

  function valorStatusEdicao(status) {
    const statusInfo = normalizarStatus(status);
    return statusInfo.padronizado ? statusInfo.value : '';
  }

  function normalizarPrioridade(prioridade) {
    const valor = normalizarTexto(prioridade);
    return ['baixa','media','alta','urgente'].includes(valor) ? valor : '';
  }

  function toast(mensagem, tipo = 'info') {
    if (window.JurisFlow?.showToast) {
      window.JurisFlow.showToast(mensagem, tipo);

  }

  function campo(label, value, extraClass = '') {
    const raw = value === null || value === undefined || value === '' ? NAO_INFORMADO : value;
    const nd = raw === NAO_INFORMADO ? ' nd' : '';
    return `
      <div class="ic-field">
        <div class="ic-label">${escapeHtml(label)}</div>
        <div class="ic-value${nd} ${extraClass}">${escapeHtml(raw)}</div>
      </div>
    `;
  }

  function campoVinculado(label, value) {
    const raw = value === null || value === undefined || value === '' ? NAO_INFORMADO : value;
    const nd = raw === NAO_INFORMADO ? ' nd' : '';
    return `
      <div class="linked-field">
        <div class="linked-label">${escapeHtml(label)}</div>
        <div class="linked-value${nd}">${escapeHtml(raw)}</div>
      </div>
    `;
  }

  function origemInfo(origem) {
    const valor = String(origem ?? '').trim();
    if (valor === 'PROCESSO_AUTOMATICO') {
      return { label:'Automático do processo', cls:'origin-auto' };
    }
    if (valor === 'MANUAL') {
      return { label:'Manual', cls:'origin-manual' };
    }
    return { label:'Manual ou legado', cls:'origin-legacy' };
  }

  function tipoCompromissoLabel(tipo) {
    const valor = normalizarTexto(tipo);
    const labels = {
      audiencia: 'Audiência',
      prazo: 'Prazo',
      reuniao: 'Reunião',
      lembrete: 'Lembrete',
      tarefa: 'Tarefa',
      protocolo: 'Protocolo'
    };
    return labels[valor] || texto(tipo);
  }

  function horaLabel(hora) {
    return texto(hora, 'Sem horário definido');
  }

  function competenciaLabel(valor) {
    const competencia = String(valor ?? '').trim();
    const match = competencia.match(/^(\d{4})-(\d{2})/);
    if (!match) return texto(competencia);

    const data = new Date(Number(match[1]), Number(match[2]) - 1, 1);
    return data.toLocaleDateString('pt-BR', { month:'short', year:'numeric' });
  }

  function fmtBytes(bytes) {
    const n = Number(bytes || 0);
    if (n < 1024) return `${n} B`;
    if (n < 1024 * 1024) return `${(n / 1024).toFixed(0)} KB`;
    return `${(n / 1024 / 1024).toFixed(1)} MB`;
  }

  function setSecaoErro(bodyId, countId, mensagem) {
    const body = document.getElementById(bodyId);
    const count = document.getElementById(countId);
    if (count) count.textContent = 'Erro';
    if (body) body.innerHTML = `<div class="empty-state">${escapeHtml(mensagem)}</div>`;
  }

    body.innerHTML = `

  async function buscarLista(url) {
    const resposta = await fetch(url);
    if (!resposta.ok) throw new Error(`HTTP ${resposta.status}`);
    const data = await resposta.json();
    return Array.isArray(data) ? data : [];
  }

  async function carregarVinculosProcesso() {
    const [compromissos, honorarios, documentos] = await Promise.allSettled([
      buscarLista(`${API_BASE}/compromissos/processo/${processoId}`),
      buscarLista(`${API_BASE}/honorarios/processo/${processoId}`),
      buscarLista(`${API_BASE}/documentos?processoId=${processoId}`)
    ]);

    if (compromissos.status === 'fulfilled') {
      renderizarCompromissos(compromissos.value);
    } else {
      console.error('Erro ao carregar compromissos do processo:', compromissos.reason);
      setSecaoErro(
        'compromissosProcessoBody',
        'compromissosProcessoCount',
        'Não foi possível carregar os compromissos vinculados a este processo.'
      );
    }

    if (honorarios.status === 'fulfilled') {
      renderizarHonorarios(honorarios.value);
    } else {
      console.error('Erro ao carregar honorários do processo:', honorarios.reason);
      setSecaoErro(
        'honorariosProcessoBody',
        'honorariosProcessoCount',
        'Não foi possível carregar os honorários vinculados a este processo.'
      );
    }

    if (documentos.status === 'fulfilled') {
      renderizarDocumentosProcesso(documentos.value);
    } else {
      console.error('Erro ao carregar documentos do processo:', documentos.reason);
      setSecaoErro(
        'documentosProcessoBody',
        'documentosProcessoCount',
        'Não foi possível carregar os documentos vinculados a este processo.'
      );
    }
  }

  function preencherClientesComAtual() {
    const cliente = processoAtual?.cliente;
    if (!cliente?.id || clientes.some(c => Number(c.id) === Number(cliente.id))) return;
    clientes.push({ id: cliente.id, nome: cliente.nome || NAO_INFORMADO });
  }

  function clienteValido(id) {
    const numero = Number(id);
    return Number.isInteger(numero) && numero > 0 && clientes.some(c => Number(c.id) === numero);
  }

  async function carregarClientes() {
    try {
      const resposta = await fetch(`${API_BASE}/clientes`);
      if (!resposta.ok) throw new Error(`HTTP ${resposta.status}`);
      const data = await resposta.json();
      clientes = Array.isArray(data) ? data : [];
    } catch (erro) {
      console.error('Erro ao carregar clientes:', erro);
      clientes = [];
    }
    preencherClientesComAtual();
  }

  }

  function renderClientesDropdown(query) {
    const dropdown = document.getElementById('editClienteDropdown');
    const q = normalizarTexto(query);
    const lista = clientes
      .filter(cliente => normalizarTexto(cliente.nome).includes(q) || String(cliente.id).includes(q))
      .slice(0, 12);

    if (!q) {
      dropdown.classList.remove('open');
      dropdown.innerHTML = '';
      return;
    }

    dropdown.innerHTML = lista.length
      ? lista.map(cliente => `
          <div class="cliente-option" data-id="${cliente.id}">
            <strong>${escapeHtml(texto(cliente.nome))}</strong>
            <span>Cliente #${escapeHtml(cliente.id)}</span>
          </div>
        `).join('')
      : '<div class="cliente-option"><strong>Nenhum cliente encontrado</strong><span>Selecione um cliente já cadastrado.</span></div>';

    dropdown.querySelectorAll('.cliente-option[data-id]').forEach(item => {
      item.addEventListener('mousedown', event => {
        event.preventDefault();
        const cliente = clientes.find(c => Number(c.id) === Number(item.dataset.id));
        if (cliente) setClienteEdicao(cliente);
      });
    });

    dropdown.classList.add('open');
  }

  function abrirModalEdicao() {
    if (!processoAtual) return;

    preencherClientesComAtual();

    document.getElementById('editSubtitle').textContent = texto(processoAtual.numero, 'Processo sem número');
    document.getElementById('editNumero').value = processoAtual.numero || '';
    document.getElementById('editTipoAcao').value = processoAtual.tipoAcao || '';
    document.getElementById('editAreaJuridica').value = processoAtual.areaJuridica || '';
    document.getElementById('editStatus').value = valorStatusEdicao(processoAtual.status);
    document.getElementById('editStatus').closest('.edit-field').classList.remove('has-error');
    document.getElementById('editPrioridade').value = normalizarPrioridade(processoAtual.prioridade);
    setClienteEdicao(processoAtual.cliente);
    document.getElementById('editTribunal').value = processoAtual.tribunal || '';
    document.getElementById('editComarca').value = processoAtual.comarca || '';
    document.getElementById('editVara').value = processoAtual.vara || '';
    document.getElementById('editJuiz').value = processoAtual.juiz || '';
    document.getElementById('editDataAbertura').value = datePart(processoAtual.dataAbertura);
    document.getElementById('editDataAudiencia').value = datePart(processoAtual.dataAudiencia);
    document.getElementById('editPrazoFinal').value = datePart(processoAtual.prazoFinal);
    document.getElementById('editUltMovimentacao').value = datePart(processoAtual.ultMovimentacao);
    document.getElementById('editValorCausa').value = moedaInput(processoAtual.valorCausa);
    document.getElementById('editValorHonorario').value = moedaInput(processoAtual.valorHonorario);
    document.getElementById('editStatusFinanceiro').value = processoAtual.statusFinanceiro || '';
    document.getElementById('editFormaPagamento').value = processoAtual.formaPagamento || '';
    document.getElementById('editParcelasHonorario').value = processoAtual.parcelasHonorario ?? '';
    document.getElementById('editVencimentoHonorario').value = datePart(processoAtual.vencimentoHonorario);
    document.getElementById('editDescricao').value = processoAtual.descricao || '';
    document.getElementById('editOverlay').classList.add('open');
  }

  function fecharModalEdicao() {
    document.getElementById('editOverlay').classList.remove('open');
    document.getElementById('editClienteDropdown').classList.remove('open');
  }

  function payloadEdicao() {
    return {
      numero: textoOuNull(document.getElementById('editNumero').value),
      tipoAcao: textoOuNull(document.getElementById('editTipoAcao').value),
      areaJuridica: textoOuNull(document.getElementById('editAreaJuridica').value),
      status: textoOuNull(document.getElementById('editStatus').value),
      descricao: textoOuNull(document.getElementById('editDescricao').value),
      dataAbertura: textoOuNull(document.getElementById('editDataAbertura').value),
      dataAudiencia: textoOuNull(document.getElementById('editDataAudiencia').value),
      prazoFinal: textoOuNull(document.getElementById('editPrazoFinal').value),
      tribunal: textoOuNull(document.getElementById('editTribunal').value),
      comarca: textoOuNull(document.getElementById('editComarca').value),
      vara: textoOuNull(document.getElementById('editVara').value),
      juiz: textoOuNull(document.getElementById('editJuiz').value),
      prioridade: textoOuNull(document.getElementById('editPrioridade').value),
      valorCausa: parseMoeda(document.getElementById('editValorCausa').value),
      statusFinanceiro: textoOuNull(document.getElementById('editStatusFinanceiro').value),
      ultMovimentacao: textoOuNull(document.getElementById('editUltMovimentacao').value),
      valorHonorario: parseMoeda(document.getElementById('editValorHonorario').value),
      formaPagamento: textoOuNull(document.getElementById('editFormaPagamento').value),
      parcelasHonorario: parseInteiro(document.getElementById('editParcelasHonorario').value),
      vencimentoHonorario: textoOuNull(document.getElementById('editVencimentoHonorario').value),
      clienteId: Number(document.getElementById('editClienteId').value)
    };
  }

  async function salvarEdicao(event) {
    event.preventDefault();
    const statusField = document.getElementById('editStatus').closest('.edit-field');
    const clienteField = document.getElementById('editClienteField');
    const payload = payloadEdicao();
    let valido = true;

    statusField.classList.toggle('has-error', !payload.status);
    if (!payload.status) valido = false;

    clienteField.classList.toggle('has-error', !clienteValido(payload.clienteId));
    if (!clienteValido(payload.clienteId)) valido = false;

    if (!valido) {
      toast('Corrija os campos destacados antes de salvar.', 'warning');
      return;
    }

    const submit = document.getElementById('editSubmit');
    submit.disabled = true;
    submit.textContent = 'Salvando...';

    try {
      const resposta = await fetch(`${API_BASE}/processos/${processoId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (!resposta.ok) throw new Error(`HTTP ${resposta.status}`);

      fecharModalEdicao();
      await carregarProcesso();
      toast('Processo atualizado com sucesso.', 'success');
    } catch (erro) {
      console.error('Erro ao atualizar processo:', erro);
      toast('Erro ao atualizar processo.', 'error');
    } finally {
      submit.disabled = false;
      submit.textContent = 'Salvar alterações';
    }
  }

  async function baixarDocumento(idDocumento) {
    try {
      const resposta = await fetch(`${API_BASE}/documentos/${idDocumento}/download`);
      if (!resposta.ok) {
        let mensagem = 'Erro ao baixar documento.';
        try {
          const erro = await resposta.json();
          mensagem = erro.message || mensagem;
        } catch {}
        throw new Error(mensagem);
      }

      const blob = await resposta.blob();
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `documento-${idDocumento}`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    } catch (erro) {
      console.error('Erro ao baixar documento:', erro);
      toast(erro.message || 'Erro ao baixar documento.', 'error');
    }
  }

  async function excluirProcesso() {
    if (!confirm('Este processo será arquivado e continuará preservado no histórico. Deseja continuar?')) return;

    try {
      const resposta = await fetch(`${API_BASE}/processos/${processoId}`, {
        method: 'DELETE'
      });

      if (!resposta.ok) {
        throw new Error(await lerMensagemErroApi(resposta, 'Erro ao arquivar processo.'));
      }

      alert('Processo arquivado com sucesso!');
      window.location.href = 'processos.html';
    } catch (erro) {
      console.error('Erro ao arquivar processo:', erro);
      alert(erro.message || 'Erro ao arquivar processo.');
    }
  }

  async function carregarProcesso() {
    try {
      const resposta = await fetch(`${API_BASE}/processos/${processoId}`);
      if (!resposta.ok) throw new Error(`HTTP ${resposta.status}`);
      processoAtual = await resposta.json();
      renderizarPerfil(processoAtual);
      await Promise.all([
        carregarClientes(),
        carregarVinculosProcesso()
      ]);
    } catch (erro) {
      console.error('Erro ao carregar processo:', erro);
      mostrarNaoEncontrado('Processo não encontrado', 'Não foi possível carregar o processo informado.');
    }
  }

  if (!Number.isInteger(processoId) || processoId <= 0) {
    mostrarNaoEncontrado('Processo não encontrado', 'O ID informado na URL é inválido.');
    return;
  }

  inserirModal();
  document.getElementById('editClose').addEventListener('click', fecharModalEdicao);
  document.getElementById('editCancel').addEventListener('click', fecharModalEdicao);
  document.getElementById('editOverlay').addEventListener('click', event => {
    if (event.target.id === 'editOverlay') fecharModalEdicao();
  });
  document.getElementById('editForm').addEventListener('submit', salvarEdicao);
  document.getElementById('editClienteBusca').addEventListener('input', event => {
    document.getElementById('editClienteId').value = '';
    document.getElementById('editClienteField').classList.remove('has-error');
    renderClientesDropdown(event.target.value);
  });
  document.getElementById('editClienteBusca').addEventListener('blur', () => {
    setTimeout(() => document.getElementById('editClienteDropdown').classList.remove('open'), 160);
  });
  document.addEventListener('click', event => {
    if (event.target.closest('#btnEditarProcesso')) abrirModalEdicao();
    if (event.target.closest('#btnExcluirProcesso')) excluirProcesso();
    const botaoDownload = event.target.closest('[data-download-documento]');
    if (botaoDownload) baixarDocumento(botaoDownload.dataset.downloadDocumento);
  });

  carregarProcesso();
})();
</script>
</body>
</html>
