<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil do Cliente — JurisFlow</title>
  <script src="../js/preferencias-aparencia.js"></script>
  <script src="../js/auth.js"></script>
  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="../css/preferencias-aparencia.css">
  <style>
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .8rem;
      color: var(--gray-400);
    }

    .breadcrumb a {
      color: var(--gray-400);
      text-decoration: none;
      transition: color .15s;
    }

    .breadcrumb a:hover {
      color: var(--navy);
    }

    .breadcrumb .sep {
      color: var(--gray-300);
    }

    .profile-header {
      background: var(--white);
      border: 1px solid var(--gray-100);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      padding: 28px 32px;
      display: flex;
      align-items: center;
      gap: 24px;
      animation: fadeUp .3s ease both;
    }

    .profile-avatar-big {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .profile-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--navy);
    }

    .profile-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .profile-cpf {
      font-size: .78rem;
      color: var(--gray-400);
      font-family: 'DM Mono', monospace;
    }

    .profile-since {
      font-size: .78rem;
      color: var(--gray-400);
    }

    .profile-actions {
      margin-left: auto;
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    .btn-act {
      height: 38px;
      padding: 0 18px;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: .83rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all .2s;
    }

    .btn-outline-act {
      background: var(--white);
      border: 1.5px solid var(--gray-200);
      color: var(--gray-700);
    }

    .btn-outline-act:hover {
      border-color: var(--navy);
      color: var(--navy);
    }

    .btn-navy-act {
      background: var(--navy);
      border: none;
      color: var(--white);
    }

    .btn-navy-act:hover {
      background: var(--navy-light);
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .info-card {
      background: var(--white);
      border: 1px solid var(--gray-100);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      animation: fadeUp .35s ease both;
    }

    .ic-header {
      padding: 15px 22px;
      border-bottom: 1px solid var(--gray-100);
      font-family: 'Playfair Display', serif;
      font-size: .92rem;
      font-weight: 600;
      color: var(--navy);
    }

    .ic-body {
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .ic-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .ic-field {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .ic-label {
      font-size: .67rem;
      font-weight: 600;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .ic-value {
      font-size: .84rem;
      color: var(--gray-800);
      font-weight: 500;
    }

    .ic-value.nd {
      color: var(--gray-300);
      font-style: italic;
      font-weight: 400;
    }

    .area-badge {
      display: inline-block;
      font-size: .67rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .area-civel {
      background: #EEF3FF;
      color: #2563EB;
    }

    .area-trabalhista {
      background: #FFFBEB;
      color: #D97706;
    }

    .area-empresarial {
      background: #ECFDF5;
      color: #059669;
    }

    .area-criminal {
      background: #FEF2F2;
      color: #DC2626;
    }

    .area-familia {
      background: #F5F3FF;
      color: #7C3AED;
    }

    .status-badge {
      display: inline-block;
      font-size: .67rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      text-transform: uppercase;
    }

    .sb-ativo {
      background: #ECFDF5;
      color: #059669;
    }

    .sb-inativo {
      background: #F1F5F9;
      color: #64748B;
    }

    .sb-pendente {
      background: #FFFBEB;
      color: #D97706;
    }

    .section-card {
      background: var(--white);
      border: 1px solid var(--gray-100);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      animation: fadeUp .4s ease both;
    }

    .sc-head {
      padding: 16px 22px;
      border-bottom: 1px solid var(--gray-100);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sc-title {
      font-family: 'Playfair Display', serif;
      font-size: .92rem;
      font-weight: 600;
      color: var(--navy);
    }

    .sc-count {
      font-size: .75rem;
      color: var(--gray-400);
      background: var(--gray-50);
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    .proc-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 22px;
      border-bottom: 1px solid var(--gray-100);
      transition: background .15s;
      cursor: pointer;
    }

    .proc-row:last-child {
      border-bottom: none;
    }

    .proc-row:hover {
      background: var(--gray-50);
    }

    .proc-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      background: var(--gray-50);
      flex-shrink: 0;
    }

    .proc-row-info {
      flex: 1;
      min-width: 0;
    }

    .proc-row-num {
      font-family: 'DM Mono', monospace;
      font-size: .72rem;
      color: var(--gray-400);
    }

    .proc-row-title {
      font-size: .84rem;
      font-weight: 600;
      color: var(--navy);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .proc-row-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .sp-andamento {
      background: #EEF3FF;
      color: #2563EB;
    }

    .sp-urgente {
      background: #FEF2F2;
      color: #DC2626;
    }

    .sp-concluido {
      background: #ECFDF5;
      color: #059669;
    }

    .sp-suspenso {
      background: #F1F5F9;
      color: #64748B;
    }

    .status-proc {
      display: inline-flex;
      align-items: center;
      font-size: .72rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
    }

    .hon-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 22px;
      border-bottom: 1px solid var(--gray-100);
      transition: background .15s;
    }

    .hon-row:last-child {
      border-bottom: none;
    }

    .hon-row:hover {
      background: var(--gray-50);
    }

    .hon-info {
      flex: 1;
      min-width: 0;
    }

    .hon-tipo {
      font-size: .84rem;
      font-weight: 600;
      color: var(--navy);
    }

    .hon-sub {
      font-size: .72rem;
      color: var(--gray-400);
      margin-top: 2px;
    }

    .hon-val {
      font-size: .88rem;
      font-weight: 700;
      margin-right: 8px;
    }

    .hon-status {
      font-size: .68rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
    }

    .hs-pago {
      background: #ECFDF5;
      color: #059669;
    }

    .hs-pendente {
      background: #FFFBEB;
      color: #D97706;
    }

    .hs-inadimpl {
      background: #FEF2F2;
      color: #DC2626;
    }

    .empty-state {
      padding: 32px;
      text-align: center;
      color: var(--gray-400);
      font-size: .84rem;
    }

    .not-found {
      text-align: center;
      padding: 60px 24px;
    }

    .not-found h2 {
      font-family: 'Playfair Display', serif;
      color: var(--navy);
      margin-bottom: 12px;
    }

    .not-found p {
      color: var(--gray-400);
      margin-bottom: 20px;
    }

    .not-found a {
      color: var(--blue-accent);
      font-weight: 600;
      text-decoration: none;
    }

    @media (max-width:900px) {
      .info-grid {
        grid-template-columns: 1fr;
      }

      .profile-header {
        flex-wrap: wrap;
      }

      .profile-actions {
        margin-left: 0;
        width: 100%;
      }
    }
  </style>
</head>

  <script src="../js/dashboard.js"></script>
  <script>
    (function () {
      'use strict';

      const podeEditarClientes = window.JurisFlowAuth?.podeEditarClientes?.() === true;

      const CORES = [
        'linear-gradient(135deg,#2563EB,#1D4ED8)',
        'linear-gradient(135deg,#10B981,#059669)',
        'linear-gradient(135deg,#F59E0B,#D97706)',
        'linear-gradient(135deg,#8B5CF6,#7C3AED)',
        'linear-gradient(135deg,#F97316,#EA580C)',
        'linear-gradient(135deg,#0D9488,#0F766E)',
        'linear-gradient(135deg,#6B7280,#4B5563)',
        'linear-gradient(135deg,#EC4899,#DB2777)'
      ];

      function getCor(id) {
        const n = String(id || '')
          .split('')
          .reduce((a, c) => a + c.charCodeAt(0), 0);

        return CORES[n % CORES.length];
      }

      function getIniciais(nome) {
        if (!nome) return '?';
        const p = nome.trim().split(/\s+/).filter(Boolean);
        if (p.length === 1) return p[0].slice(0, 2).toUpperCase();
        return (p[0][0] + p[p.length - 1][0]).toUpperCase();
      }

      function normArea(a) {
        if (!a) return '';
        const m = {
          'Cível': 'civel',
          'Trabalhista': 'trabalhista',
          'Empresarial': 'empresarial',
          'Criminal': 'criminal',
          'Família': 'familia',
          'Familia': 'familia'
        };

        if (m[a]) return m[a];

        const s = a.toLowerCase();

        if (s.includes('civ')) return 'civel';
        if (s.includes('trab')) return 'trabalhista';
        if (s.includes('empres')) return 'empresarial';
        if (s.includes('crim')) return 'criminal';
        if (s.includes('fam')) return 'familia';

        return s;
      }

      const NAO_INFORMADO = 'Não informado';

      function escapeHtml(value) {
        return String(value ?? '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }

      async function lerMensagemErroApi(resposta, fallback) {
        try {
          const dados = await resposta.json();
          return dados?.message || dados?.erro || dados?.error || fallback;
        } catch {
          return fallback;
        }
      }

      function campo(obj, ...nomes) {
        for (const nome of nomes) {
          const texto = String(obj?.[nome] ?? '').trim();
          if (texto) return texto;
        }
        return '';
      }

      function valor(val) {
        const texto = String(val ?? '').trim();
        return texto || NAO_INFORMADO;
      }

      function fmtData(iso) {
        if (!iso) return NAO_INFORMADO;
        if (typeof window.JurisFlowFormatarData === 'function') {
          return window.JurisFlowFormatarData(iso);
        }

        try {
          const texto = String(iso);
          const partes = texto.match(/^(\d{4})-(\d{2})-(\d{2})/);
          const d = partes
            ? new Date(Number(partes[1]), Number(partes[2]) - 1, Number(partes[3]))
            : new Date(texto);

          if (isNaN(d.getTime())) return NAO_INFORMADO;

          return String(d.getDate()).padStart(2, '0') + '/' +
            String(d.getMonth() + 1).padStart(2, '0') + '/' +
            d.getFullYear();

        } catch (e) {
          return NAO_INFORMADO;
        }
      }

      function clienteDesde(dataCadastro) {
        const data = fmtData(dataCadastro);
        return data === NAO_INFORMADO ? NAO_INFORMADO : 'Cliente desde ' + data;
      }

      function fmtBytes(bytes) {
        const n = Number(bytes || 0);
        if (n < 1024) return `${n} B`;
        if (n < 1024 * 1024) return `${(n / 1024).toFixed(0)} KB`;
        return `${(n / 1024 / 1024).toFixed(1)} MB`;
      }

      function campoInfo(label, value, extraStyle = '') {
        const texto = String(value ?? '').trim();
        const missing = !texto || texto === NAO_INFORMADO;
        return `
          <div class="ic-field">
            <div class="ic-label">${label}</div>
            <div class="ic-value ${missing ? 'nd' : ''}" ${extraStyle ? `style="${extraStyle}"` : ''}>
              ${escapeHtml(valor(value))}
            </div>
          </div>
        `;
      }

      const areaMap = {
        civel: 'area-civel',
        trabalhista: 'area-trabalhista',
        empresarial: 'area-empresarial',
        criminal: 'area-criminal',
        familia: 'area-familia'
      };

      const areaLabel = {
        civel: 'Cível',
        trabalhista: 'Trabalhista',
        empresarial: 'Empresarial',
        criminal: 'Criminal',
        familia: 'Família'
      };

      const id = new URLSearchParams(window.location.search).get('id');
      const main = document.getElementById('mainContent');

      if (!id) {
        main.innerHTML = `
      <div class="not-found">
        <h2>Cliente não encontrado</h2>
        <p>Nenhum ID foi informado.</p>
        <a href="clientes.html">← Voltar para Clientes</a>
      </div>
    `;
        return;
      }

      async function carregarCliente() {
        try {
          const resposta = await fetch(`http://localhost:8080/clientes/${id}`);

          if (!resposta.ok) {
            throw new Error('Cliente não encontrado');
          }

          const cliente = await resposta.json();

          let processos = [];

          try {
            const processosResposta = await fetch(`http://localhost:8080/processos/cliente/${id}`);
            if (processosResposta.ok) {
              processos = await processosResposta.json();
            }
          } catch (erroProcessos) {
            console.error('Erro ao carregar processos do cliente:', erroProcessos);
          }

          const honorarios = [];

          let documentos = [];
          try {
            const documentosResposta = await fetch(`http://localhost:8080/documentos?clienteId=${id}`);
            if (documentosResposta.ok) {
              documentos = await documentosResposta.json();
            }
          } catch (erroDocumentos) {
            console.error('Erro ao carregar documentos do cliente:', erroDocumentos);
          }

          const nomeCliente = valor(cliente.nome);

          document.getElementById('pageTitle').textContent = nomeCliente;
          document.title = nomeCliente + ' — JurisFlow';

          const area = normArea(cliente.areaJuridica);
          const aClasse = area ? (areaMap[area] || '') : '';
          const aLabel = area ? (areaLabel[area] || cliente.areaJuridica) : NAO_INFORMADO;

          const stCls = {
            ativo: 'sb-ativo',
            inativo: 'sb-inativo',
            pendente: 'sb-pendente'
          }[cliente.status] || 'sb-inativo';

          const stLabel = {
            ativo: 'Ativo',
            inativo: 'Inativo',
            pendente: 'Pendente'
          }[cliente.status] || valor(cliente.status);

          function procRows() {
            if (!processos.length) {
              return '<div class="empty-state">Nenhum processo vinculado</div>';
            }

            return processos.map(p => `
    <div class="proc-row">
      <div class="proc-icon">📁</div>

      <div class="proc-row-info">
        <div class="proc-row-num">${escapeHtml(valor(p.numero))}</div>
        <div class="proc-row-title">${escapeHtml(valor(p.tipoAcao))}</div>
      </div>

      <div class="proc-row-right">
        <span class="area-badge ${areaMap[normArea(p.areaJuridica)] || ''}">
          ${escapeHtml(valor(p.areaJuridica))}
        </span>

        <span class="status-proc ${p.status === 'urgente' ? 'sp-urgente' : p.status === 'concluido' ? 'sp-concluido' : p.status === 'suspenso' ? 'sp-suspenso' : 'sp-andamento'}">
          ${escapeHtml(valor(p.status))}
        </span>
      </div>
    </div>
  `).join('');
          }

          function honRows() {
            return '<div class="empty-state">Nenhum honorário registrado</div>';
          }

          function docRows() {
            if (!documentos.length) {
              return '<div class="empty-state">Nenhum documento vinculado</div>';
            }

            return documentos.map(d => `
              <div class="hon-row">
                <div class="proc-icon">📄</div>
                <div class="hon-info">
                  <div class="hon-tipo">${escapeHtml(valor(d.titulo || d.nomeOriginal))}</div>
                  <div class="hon-sub">${escapeHtml(valor(d.categoria))} · ${escapeHtml(fmtBytes(d.tamanhoBytes))} · ${escapeHtml(fmtData(d.dataUpload))}</div>
                </div>
                <button class="btn-act btn-outline-act" type="button" data-download-documento="${escapeHtml(d.id)}">Baixar</button>
              </div>
            `).join('');
          }

          main.innerHTML = `
        <div class="breadcrumb">
          <a href="clientes.html">👤 Clientes</a>
          <span class="sep">›</span>
          <span>${escapeHtml(nomeCliente)}</span>
        </div>

        <div class="profile-header">
          <div class="profile-avatar-big" style="background:${getCor(cliente.id)};">
            ${escapeHtml(getIniciais(cliente.nome))}
          </div>

          <div style="flex:1;min-width:0;">
            <div class="profile-name">${escapeHtml(nomeCliente)}</div>

            <div class="profile-meta">
              <span class="profile-cpf">${escapeHtml(valor(cliente.cpfCnpj))}</span>
              <span class="area-badge ${aClasse}">${escapeHtml(aLabel)}</span>
              <span class="status-badge ${stCls}">${escapeHtml(stLabel)}</span>
              <span class="profile-since">${escapeHtml(clienteDesde(cliente.dataCadastro))}</span>
            </div>
          </div>
      <div class="profile-actions">
          <button class="btn-act btn-outline-act" onclick="window.location.href='clientes.html'">
  ← Voltar
</button>

${podeEditarClientes ? `<button class="btn-act btn-navy-act" id="btnEditarCliente">
  ✏️ Editar
</button>` : ''}

${podeEditarClientes ? `<button class="btn-act btn-outline-act" id="btnExcluirCliente" style="border-color:#DC2626;color:#DC2626;">
  🗑️ Arquivar
</button>` : ''}
          </div>
        </div>

        <div class="info-grid">

      async function baixarDocumento(idDocumento) {
        try {
          const resposta = await fetch(`http://localhost:8080/documentos/${idDocumento}/download`);
          if (!resposta.ok) {
            let mensagem = 'Erro ao baixar documento.';
            try {
              const erro = await resposta.json();
              mensagem = erro.message || mensagem;
            } catch {}
            throw new Error(mensagem);
          }

          const blob = await resposta.blob();
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.href = url;
          link.download = `documento-${idDocumento}`;
          document.body.appendChild(link);
          link.click();
          link.remove();
          URL.revokeObjectURL(url);
        } catch (erro) {
          console.error(erro);
          alert(erro.message || 'Erro ao baixar documento.');
        }
      }

      document.addEventListener('click', event => {
        const botao = event.target.closest('[data-download-documento]');
        if (!botao) return;
        baixarDocumento(botao.dataset.downloadDocumento);
      });

      carregarCliente();
